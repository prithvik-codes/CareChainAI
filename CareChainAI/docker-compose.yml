version: "3.9"

services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthvault-backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      - faiss_data:/app/faiss_index
    depends_on:
      db:
        condition: service_healthy
    networks:
      - healthvault-net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthvault-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - healthvault-net

  # ── PostgreSQL (production DB) ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: healthvault-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthvault
      POSTGRES_PASSWORD: healthvault_secret
      POSTGRES_DB: healthvault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthvault"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - healthvault-net

volumes:
  postgres_data:
  uploads_data:
  faiss_data:

networks:
  healthvault-net:
    driver: bridge
